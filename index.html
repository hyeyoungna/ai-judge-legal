<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판결해줘 (AI Judge)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #FCF6EA, #F0E8D8);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 48px 36px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .emoji { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 24px; font-weight: 900; color: #2E2A27; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #9E9E9E; margin-bottom: 32px; }
        a {
            display: block;
            padding: 14px;
            margin-bottom: 12px;
            background: #A9A5F6;
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
        }
        a:nth-child(3) { background: #97D9CD; }
        a:nth-child(4) { background: #FE8386; }
        a:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">⚖️</div>
        <h1>판결해줘</h1>
        <p class="subtitle">AI 판사가 내리는 일상 판결</p>
        <a href="privacy-policy.html">개인정보 처리방침</a>
        <a href="terms.html">이용약관</a>
        <a href="support.html">고객지원</a>
    </div>
</body>
</html>
